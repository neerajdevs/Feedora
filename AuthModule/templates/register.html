{% extends 'base.html' %}
{% load static %}

{% block title %}Join Feedora Advance{% endblock %}

{% block content %}
<div class="min-h-[85vh] flex items-center justify-center relative z-10 px-4 py-12">
    
    <div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-full max-w-xl h-[600px] bg-purple-500/20 rounded-full blur-[120px] -z-10 pointer-events-none"></div>

    <div class="w-full max-w-lg p-8 md:p-12 rounded-3xl shadow-2xl bg-[#1e293b] border border-[#334155] relative overflow-hidden">
        
        <div class="text-center mb-8">
            <h1 class="text-3xl font-extrabold text-white tracking-tight">Create Account</h1>
            <p class="text-slate-400 text-sm mt-2">Join the community of developers</p>
        </div>

        <form method="POST" class="space-y-5">
            {% csrf_token %}
            
            <div class="space-y-1">
                <label class="block text-xs font-bold text-slate-300 uppercase tracking-wider pl-1">Username</label>
                <div class="relative group">
                    <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                        <svg class="h-5 w-5 text-slate-500 group-focus-within:text-purple-400 transition-colors" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" />
                        </svg>
                    </div>
                    <input type="text" name="username" required 
                           class="block w-full pl-11 pr-4 py-3.5 rounded-xl 
                                  bg-[#0f172a] border border-[#334155] 
                                  text-white placeholder-slate-500 font-medium
                                  focus:outline-none focus:ring-2 focus:ring-purple-500 focus:border-purple-500 
                                  transition-all duration-200 sm:text-sm" 
                           placeholder="Choose a username">
                </div>
            </div>

            <div class="space-y-1">
                <label class="block text-xs font-bold text-slate-300 uppercase tracking-wider pl-1">Email</label>
                <div class="relative group">
                    <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                        <svg class="h-5 w-5 text-slate-500 group-focus-within:text-purple-400 transition-colors" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z" />
                        </svg>
                    </div>
                    <input type="email" name="email" required 
                           class="block w-full pl-11 pr-4 py-3.5 rounded-xl 
                                  bg-[#0f172a] border border-[#334155] 
                                  text-white placeholder-slate-500 font-medium
                                  focus:outline-none focus:ring-2 focus:ring-purple-500 focus:border-purple-500 
                                  transition-all duration-200 sm:text-sm" 
                           placeholder="name@example.com">
                </div>
            </div>

            <div class="space-y-1">
                <label class="block text-xs font-bold text-slate-300 uppercase tracking-wider pl-1">Password</label>
                <div class="relative group">
                    <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                        <svg class="h-5 w-5 text-slate-500 group-focus-within:text-purple-400 transition-colors" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" />
                        </svg>
                    </div>
                    <input type="password" name="password" required 
                           class="block w-full pl-11 pr-4 py-3.5 rounded-xl 
                                  bg-[#0f172a] border border-[#334155] 
                                  text-white placeholder-slate-500 font-medium
                                  focus:outline-none focus:ring-2 focus:ring-purple-500 focus:border-purple-500 
                                  transition-all duration-200 sm:text-sm" 
                           placeholder="••••••••">
                </div>
            </div>

            <div class="space-y-1">
                <label class="block text-xs font-bold text-slate-300 uppercase tracking-wider pl-1">Confirm Password</label>
                <div class="relative group">
                    <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                        <svg class="h-5 w-5 text-slate-500 group-focus-within:text-purple-400 transition-colors" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z" />
                        </svg>
                    </div>
                    <input type="password" name="confirm_password" required 
                           class="block w-full pl-11 pr-4 py-3.5 rounded-xl 
                                  bg-[#0f172a] border border-[#334155] 
                                  text-white placeholder-slate-500 font-medium
                                  focus:outline-none focus:ring-2 focus:ring-purple-500 focus:border-purple-500 
                                  transition-all duration-200 sm:text-sm" 
                           placeholder="••••••••">
                </div>
            </div>

            <div class="flex items-center gap-3 pt-2 pl-1">
                <div class="flex items-center h-5">
                    <input id="terms" type="checkbox" required class="w-4 h-4 bg-[#0f172a] border-[#334155] rounded focus:ring-purple-500 ring-offset-[#1e293b] text-purple-600 cursor-pointer">
                </div>
                <div class="text-sm">
                    <label for="terms" class="text-slate-400 cursor-pointer select-none">I agree to the <a href="#" class="text-purple-400 hover:text-purple-300 underline">Terms</a> and <a href="#" class="text-purple-400 hover:text-purple-300 underline">Privacy Policy</a>.</label>
                </div>
            </div>

            <button type="submit" class="w-full bg-gradient-to-r from-purple-600 to-pink-600 hover:from-purple-500 hover:to-pink-500 text-white font-bold py-3.5 rounded-xl transition-all duration-200 shadow-lg shadow-purple-500/20 flex items-center justify-center gap-2 transform active:scale-[0.98]">
                Create Account 
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 7l5 5m0 0l-5 5m5-5H6"></path></svg>
            </button>
        </form>

        <div class="relative my-8">
            <div class="absolute inset-0 flex items-center">
                <div class="w-full border-t border-[#334155]"></div>
            </div>
            <div class="relative flex justify-center text-sm">
                <span class="px-4 bg-[#1e293b] text-slate-400 rounded-full text-xs uppercase tracking-wider">Already a member?</span>
            </div>
        </div>

        <div class="text-center">
            <a href="{% url 'login' %}" class="inline-block w-full px-4 py-3 border border-[#334155] rounded-xl bg-[#0f172a] hover:bg-[#334155] transition-all text-sm font-medium text-slate-300 hover:text-white">
                Sign In to your account
            </a>
        </div>

    </div>
</div>
{% endblock %}
