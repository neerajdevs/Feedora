{% extends 'base.html' %}
{% load static %}

{% block title %}Edit Post | Feedora{% endblock %}

{% block content %}
<style>
    .custom-django-form label {
        display: block;
        font-size: 0.875rem;
        font-weight: 700;
        color: #cbd5e1;
        margin-bottom: 0.5rem;
        margin-top: 1.5rem;
    }

    .custom-django-form input[type="text"],
    .custom-django-form select,
    .custom-django-form textarea {
        width: 100%;
        background-color: #0f172a;
        border: 1px solid #334155;
        color: white;
        border-radius: 0.75rem;
        padding: 0.875rem 1rem;
        font-size: 1rem;
        outline: none;
        transition: all 0.2s ease-in-out;
        box-shadow: inset 0 2px 4px 0 rgb(0 0 0 / 0.05);
    }

    .custom-django-form input:focus,
    .custom-django-form select:focus,
    .custom-django-form textarea:focus {
        border-color: #06b6d4;
        box-shadow: 0 0 0 1px #06b6d4;
    }
</style>

<div class="min-h-screen bg-[#0f172a] relative overflow-hidden font-sans py-20 px-4">
    <div class="absolute top-0 left-1/2 -translate-x-1/2 w-[600px] h-[600px] bg-cyan-500/10 rounded-full blur-[150px] pointer-events-none -z-10"></div>

    <div class="max-w-4xl mx-auto bg-[#1e293b]/60 backdrop-blur-xl border border-[#334155]/60 rounded-3xl shadow-2xl relative z-10 overflow-hidden">
        
        <div class="px-8 py-6 border-b border-[#334155]/50 bg-[#1e293b]/50 flex items-center justify-between">
            <h1 class="text-2xl font-extrabold text-white flex items-center gap-3">
                <svg class="w-6 h-6 text-cyan-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"></path></svg>
                Edit Post
            </h1>
            <a href="javascript:history.back()" class="p-2 text-slate-400 hover:text-white hover:bg-slate-700/50 rounded-full transition-colors">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
            </a>
        </div>

        <form method="POST" class="p-8 custom-django-form">
            {% csrf_token %}
            
            <label for="title">Title:</label>
            <input type="text" name="title" id="title" value="{{ post.title }}" required>

            <label for="category">Category:</label>
            <select name="category" id="category">
                <option value="">---------</option>
                {% for cat in categories %}
                    <option value="{{ cat.id }}" {% if post.category_id == cat.id|stringformat:"s" %}selected{% endif %}>{{ cat.name }}</option>
                {% endfor %}
            </select>

            <label for="content">Content:</label>
            <textarea name="content" id="content" rows="10">{{ post.content|safe }}</textarea>

            <div class="flex flex-col sm:flex-row items-center justify-end gap-4 border-t border-[#334155]/50 pt-6 mt-8">
                <a href="javascript:history.back()" class="w-full sm:w-auto px-6 py-3 rounded-xl font-bold text-slate-300 hover:text-white text-center bg-transparent hover:bg-slate-800 transition-colors">
                    Cancel
                </a>

                <button type="submit" name="save_draft" class="w-full sm:w-auto px-6 py-3 rounded-xl font-bold text-slate-200 bg-[#334155] hover:bg-[#475569] border border-[#475569] shadow-lg transition-all flex items-center justify-center gap-2">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7H5a2 2 0 00-2 2v9a2 2 0 002 2h14a2 2 0 002-2V9a2 2 0 00-2-2h-3m-1 4l-3 3m0 0l-3-3m3 3V4"></path></svg>
                    Save as Draft
                </button>

                <button type="submit" name="publish" class="w-full sm:w-auto px-8 py-3 rounded-xl font-bold text-white bg-gradient-to-r from-cyan-600 to-blue-600 hover:from-cyan-500 hover:to-blue-500 shadow-lg shadow-cyan-900/50 transform active:scale-95 transition-all flex items-center justify-center gap-2">
                    Update & Publish
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path></svg>
                </button>
            </div>
        </form>
    </div>
</div>

<script src="https://cdn.ckeditor.com/4.21.0/standard/ckeditor.js"></script>
<script>
    CKEDITOR.replace('content', {
        width: '100%',
        height: 300,
        uiColor: '#1e293b'
    });
</script>
{% endblock %}
